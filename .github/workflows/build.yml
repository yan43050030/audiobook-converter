name: Build Release

on:
  push:
    tags:
      - 'v*'
  # 本地 tag 推送被环境阻断时，可用手动触发。填入 tag 名（例如 v2.5.0）即可，
  # 工作流会在当前 main HEAD 创建该 tag 并在 Release 上挂载构建产物。
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name (e.g., v2.5.0)。工作流会自动创建该 tag 并发布。'
        required: true
        default: 'v2.5.0'

# Release 直传所需权限（contents: write）
permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build macOS app
        run: |
          pyinstaller audiobook_converter_mac.spec --clean --noconfirm

      - name: Zip macOS app
        run: |
          cd dist
          zip -r AudiobookConverter_macOS.zip AudiobookConverter.app

      # 直接发布到 Release，不经过 actions/upload-artifact（避开 artifact 配额）
      - name: Upload macOS build to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/AudiobookConverter_macOS.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Windows exe
        run: |
          pyinstaller audiobook_converter_win.spec --clean --noconfirm

      - name: Zip Windows exe
        run: |
          cd dist
          Compress-Archive -Path audiobook_converter.exe -DestinationPath audiobook_converter_Windows.zip

      # 直接发布到 Release，不经过 actions/upload-artifact（避开 artifact 配额）
      - name: Upload Windows build to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/audiobook_converter_Windows.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
